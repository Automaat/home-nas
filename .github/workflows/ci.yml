name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs for same PR/branch (but not deploys on main)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Restrict permissions for security
permissions:
  contents: read
  actions: read
  pull-requests: write
  security-events: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
      MISE_PYTHON_PRECOMPILED_FLAVOR: install_only
    steps:
      # Cannot pin by digest: Renovate will manage action updates
      - uses: actions/checkout@v6

      # Install mise for tool management
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # 4.0.1
        with:
          install: true

      # Cache Terraform providers for faster init
      - name: Create plugin cache dir
        run: mkdir -p $TF_PLUGIN_CACHE_DIR

      # Cannot pin by digest: Renovate will manage action updates
      - uses: actions/cache@v5
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: ${{ runner.os }}-terraform-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      # Security scanning with Trivy
      - uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: 'config'
          scan-ref: 'terraform/'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      # Linting with TFLint
      - name: Init TFLint
        run: tflint --init
      - name: Run TFLint
        run: tflint --recursive --format compact

      # Format and validation
      - name: Format check
        run: |
          cd terraform
          tofu fmt -check -recursive

      - name: Init and validate
        run: |
          cd terraform
          tofu init -backend=false
          tofu validate

  ansible:
    runs-on: ubuntu-latest
    env:
      MISE_PYTHON_PRECOMPILED_FLAVOR: install_only
    steps:
      # Cannot pin by digest: Renovate will manage action updates
      - uses: actions/checkout@v6

      # Install mise for tool management
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # 4.0.1
        with:
          install: true

      # Install Python dependencies
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # Install Ansible collections
      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      # YAML syntax validation
      - name: YAML Lint
        run: yamllint ansible/

      # Ansible best practices linting
      - name: Ansible Lint
        run: ansible-lint ansible/playbooks/

      # Syntax validation
      - name: Syntax check
        run: |
          cd ansible
          for playbook in playbooks/*.yml; do
            ansible-playbook --syntax-check "$playbook"
          done

      # Inventory validation
      - name: Validate inventory
        run: ansible-inventory -i ansible/inventory.yml --list > /dev/null

  changes:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [terraform, ansible]
    runs-on: ubuntu-latest
    outputs:
      stacks: ${{ steps.filter.outputs.changes }}
    steps:
      # Cannot pin by digest: Renovate will manage action updates
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            infrastructure:
              - 'ansible/docker-compose/infrastructure-stack.yml'
              - 'ansible/docker-compose/traefik/**'
              - 'ansible/playbooks/deploy-infrastructure-stack.yml'
            adguard:
              - 'ansible/docker-compose/adguard-stack.yml'
              - 'ansible/playbooks/deploy-adguard.yml'
              - 'ansible/playbooks/templates/AdGuardHome.yaml.j2'
            media-management:
              - 'ansible/docker-compose/media-management-stack.yml'
              - 'ansible/playbooks/deploy-media-management.yml'
            jellyfin:
              - 'ansible/docker-compose/jellyfin-stack.yml'
              - 'ansible/playbooks/deploy-media-stack.yml'
            immich:
              - 'ansible/docker-compose/immich-stack.yml'
              - 'ansible/playbooks/deploy-immich.yml'
            nextcloud:
              - 'ansible/docker-compose/nextcloud-stack.yml'
              - 'ansible/playbooks/deploy-nextcloud.yml'
            paperless:
              - 'ansible/docker-compose/paperless-stack.yml'
              - 'ansible/playbooks/deploy-paperless.yml'
            sybra:
              - 'ansible/docker-compose/sybra-stack.yml'
              - 'ansible/playbooks/deploy-sybra.yml'
              - 'ansible/playbooks/files/sybra/**'
            finance-buddy:
              - 'ansible/docker-compose/finance-buddy-stack.yml'
              - 'ansible/playbooks/deploy-finance-buddy.yml'
            downloads:
              - 'ansible/docker-compose/downloads-stack.yml'
              - 'ansible/playbooks/deploy-downloads.yml'
            monitoring-agents:
              - 'ansible/docker-compose/monitoring-agents-stack.yml'
              - 'ansible/playbooks/deploy-monitoring-agents.yml'

  deploy:
    needs: changes
    if: needs.changes.outputs.stacks != '[]'
    runs-on: [self-hosted, home-nas]
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        stack: ${{ fromJson(needs.changes.outputs.stacks) }}
    steps:
      # Cannot pin by digest: Renovate will manage action updates
      - uses: actions/checkout@v6

      # Cannot pin by digest: Renovate will manage action updates
      - uses: actions/cache@v5
        with:
          path: ~/.ansible/collections
          key: ${{ runner.os }}-ansible-collections-${{ hashFiles('ansible/requirements.yml') }}
          restore-keys: |
            ${{ runner.os }}-ansible-collections-

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Resolve playbook + limit
        id: map
        run: |
          case "${{ matrix.stack }}" in
            infrastructure)     pb=deploy-infrastructure-stack.yml; lim=infrastructure ;;
            adguard)            pb=deploy-adguard.yml;              lim=infrastructure ;;
            media-management)   pb=deploy-media-management.yml;     lim=media-management ;;
            jellyfin)           pb=deploy-media-stack.yml;          lim=jellyfin ;;
            immich)             pb=deploy-immich.yml;               lim=jellyfin ;;
            nextcloud)          pb=deploy-nextcloud.yml;            lim=custom-workloads ;;
            paperless)          pb=deploy-paperless.yml;            lim=custom-workloads ;;
            sybra)              pb=deploy-sybra.yml;                lim=sybra ;;
            finance-buddy)      pb=deploy-finance-buddy.yml;        lim=pet-projects ;;
            downloads)          pb=deploy-downloads.yml;            lim=downloads ;;
            monitoring-agents)  pb=deploy-monitoring-agents.yml;    lim=all ;;
            *) echo "Unknown stack: ${{ matrix.stack }}"; exit 1 ;;
          esac
          {
            echo "playbook=$pb"
            echo "limit=$lim"
          } >> "$GITHUB_OUTPUT"

      - name: Run playbook
        working-directory: ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: ansible-playbook -i inventory.yml playbooks/${{ steps.map.outputs.playbook }} --limit ${{ steps.map.outputs.limit }}
