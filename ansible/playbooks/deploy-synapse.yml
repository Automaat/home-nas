---
- name: Deploy synapse to synapse LXC
  hosts: synapse
  become: true

  vars:
    data_root: /data
    compose_file: /opt/synapse/docker-compose.yml

  tasks:
    - name: Install Docker and dependencies
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-v2
        state: present
        update_cache: true

    - name: Ensure Docker service is running
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Create data directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
        owner: "0"
        group: "0"
      loop:
        - "{{ data_root }}/synapse"
        - "{{ data_root }}/synapse/home"
        - "{{ data_root }}/synapse/claude"
        - "{{ data_root }}/synapse/codex"

    - name: Create compose directory
      ansible.builtin.file:
        path: /opt/synapse
        state: directory
        mode: '0755'

    - name: Copy docker-compose file
      ansible.builtin.copy:
        src: ../docker-compose/synapse-stack.yml
        dest: "{{ compose_file }}"
        mode: '0644'

    - name: Deploy synapse stack
      community.docker.docker_compose_v2:
        project_src: /opt/synapse
        state: present
        pull: always

    - name: Wait for services to be ready
      ansible.builtin.wait_for:
        timeout: 30
      delegate_to: localhost
      become: false

    - name: Verify container is running
      ansible.builtin.shell:
        cmd: docker ps --filter name=^synapse$ --filter status=running --format '{% raw %}{{.Names}}{% endraw %}'
      register: container_status
      changed_when: false
      failed_when: container_status.stdout_lines | length == 0
