---
- name: Deploy media stack to Jellyfin LXC
  hosts: jellyfin
  become: true

  vars:
    data_root: /data
    compose_file: /opt/jellyfin-stack/docker-compose.yml

  tasks:
    - name: Install Docker
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-v2
        state: present
        update_cache: true

    - name: Ensure Docker service is running
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    # data_root is a VirtioFS mount from the proxmox host's ZFS dataset.
    # chown/chmod across the virtiofs boundary returns EPERM, so we use
    # `mkdir -p` with `creates:` — the command is skipped entirely if the
    # dir already exists and never touches its mode or ownership.
    - name: Create data directories
      ansible.builtin.command:
        cmd: "mkdir -p {{ item }}"
        creates: "{{ item }}"
      loop:
        - "{{ data_root }}"
        - "{{ data_root }}/jellyfin/config"
        - "{{ data_root }}/jellyseerr/config"
        - "{{ data_root }}/navidrome/config"
        - "{{ data_root }}/media"
        - "{{ data_root }}/media/tv"
        - "{{ data_root }}/media/movies"
        - "{{ data_root }}/media/music"
        - "{{ data_root }}/media/books"

    - name: Create compose directory
      ansible.builtin.file:
        path: /opt/jellyfin-stack
        state: directory
        mode: '0755'

    - name: Copy docker-compose file
      ansible.builtin.copy:
        src: ../docker-compose/jellyfin-stack.yml
        dest: "{{ compose_file }}"
        mode: '0644'

    - name: Deploy jellyfin stack
      community.docker.docker_compose_v2:
        project_src: /opt/jellyfin-stack
        state: present
        pull: always

    - name: Verify containers are running
      community.docker.docker_container_info:
        name: "{{ item }}"
      register: container_info
      failed_when: not container_info.exists or container_info.container.State.Status != 'running'
      loop:
        - jellyfin
        - jellyseerr
        - navidrome
