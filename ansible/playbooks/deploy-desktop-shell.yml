---
# ansible/playbooks/deploy-desktop-shell.yml
# Installs zsh + oh-my-zsh + terminal tools matching environment-as-code setup
- name: Configure desktop shell environment
  hosts: desktop
  become: true

  vars:
    desktop_user: marcin
    user_home: /home/marcin

  tasks:
    - name: Install apt packages
      ansible.builtin.apt:
        name:
          - zsh
          - git
          - git-lfs
          - tmux
          - tree
          - jq
          - bat
          - fzf
          - autojump
          - direnv
          - age
          - pre-commit
          - curl
          - unzip
          - shellcheck
          - ripgrep
        state: present
        update_cache: true

    - name: Download gh CLI apt repo key
      ansible.builtin.get_url:
        url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
        dest: /usr/share/keyrings/githubcli-archive-keyring.gpg
        mode: "0644"

    - name: Add gh CLI apt repo
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch=amd64 signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg]
          https://cli.github.com/packages stable main
        filename: github-cli
        state: present

    - name: Install gh CLI
      ansible.builtin.apt:
        name: gh
        state: present
        update_cache: true

    - name: Download starship install script
      ansible.builtin.get_url:
        url: https://starship.rs/install.sh
        dest: /tmp/starship-install.sh
        mode: "0755"

    - name: Install starship
      ansible.builtin.command:
        cmd: /tmp/starship-install.sh --yes
        creates: /usr/local/bin/starship

    - name: Set zsh as default shell for {{ desktop_user }}
      ansible.builtin.user:
        name: "{{ desktop_user }}"
        shell: /bin/zsh

    - name: Download oh-my-zsh install script
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
        dest: /tmp/ohmyzsh-install.sh
        mode: "0755"

    - name: Install oh-my-zsh
      ansible.builtin.command:
        cmd: /tmp/ohmyzsh-install.sh --unattended
        creates: "{{ user_home }}/.oh-my-zsh"
      become: true
      become_user: "{{ desktop_user }}"
      environment:
        HOME: "{{ user_home }}"

    - name: Install zsh-autosuggestions plugin
      ansible.builtin.git:
        repo: https://github.com/zsh-users/zsh-autosuggestions
        dest: "{{ user_home }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
        depth: 1
        version: master
      become: true
      become_user: "{{ desktop_user }}"

    - name: Install zsh-syntax-highlighting plugin
      ansible.builtin.git:
        repo: https://github.com/zsh-users/zsh-syntax-highlighting
        dest: "{{ user_home }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
        depth: 1
        version: master
      become: true
      become_user: "{{ desktop_user }}"

    - name: Install zsh-you-should-use plugin
      ansible.builtin.git:
        repo: https://github.com/MichaelAquilina/zsh-you-should-use
        dest: "{{ user_home }}/.oh-my-zsh/custom/plugins/you-should-use"
        depth: 1
        version: master
      become: true
      become_user: "{{ desktop_user }}"

    - name: Download mise install script
      ansible.builtin.get_url:
        url: https://mise.run
        dest: /tmp/mise-install.sh
        mode: "0755"

    - name: Install mise
      ansible.builtin.command:
        cmd: /tmp/mise-install.sh
        creates: "{{ user_home }}/.local/bin/mise"
      become: true
      become_user: "{{ desktop_user }}"
      environment:
        HOME: "{{ user_home }}"

    - name: Ensure .config directory exists
      ansible.builtin.file:
        path: "{{ user_home }}/.config"
        state: directory
        owner: "{{ desktop_user }}"
        group: "{{ desktop_user }}"
        mode: "0755"

    - name: Write .zshrc
      ansible.builtin.copy:
        dest: "{{ user_home }}/.zshrc"
        owner: "{{ desktop_user }}"
        group: "{{ desktop_user }}"
        mode: "0644"
        content: |
          export ZSH="$HOME/.oh-my-zsh"

          ZSH_THEME="robbyrussell"

          plugins=(
            git
            docker
            docker-compose
            golang
            helm
            kubectl
            terraform
            fzf
            zsh-autosuggestions
            zsh-syntax-highlighting
            you-should-use
          )

          source $ZSH/oh-my-zsh.sh

          # History
          HISTSIZE=1000000000
          SAVEHIST=1000000000
          setopt SHARE_HISTORY
          setopt EXTENDED_HISTORY
          setopt HIST_IGNORE_ALL_DUPS

          # Tools
          eval "$(direnv hook zsh)"
          eval "$(autojump --zsh 2>/dev/null || true)"
          [ -f ~/.local/bin/mise ] && eval "$(~/.local/bin/mise activate zsh)"

          # fzf
          [ -f /usr/share/doc/fzf/examples/key-bindings.zsh ] && \
            source /usr/share/doc/fzf/examples/key-bindings.zsh
          [ -f /usr/share/doc/fzf/examples/completion.zsh ] && \
            source /usr/share/doc/fzf/examples/completion.zsh

          # bat alias (batcat on Ubuntu)
          [ -x "$(command -v batcat)" ] && alias bat='batcat'

          # Starship prompt
          eval "$(starship init zsh)"

          export EDITOR=vim
          export PATH="$HOME/.local/bin:$HOME/bin:$HOME/go/bin:$PATH"

    - name: Download Microsoft Edge apt repo key
      ansible.builtin.get_url:
        url: https://packages.microsoft.com/keys/microsoft.asc
        dest: /usr/share/keyrings/microsoft.asc
        mode: "0644"

    - name: Add Microsoft Edge apt repo
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.asc]
          https://packages.microsoft.com/repos/edge stable main
        filename: microsoft-edge
        state: present

    - name: Install Microsoft Edge
      ansible.builtin.apt:
        name: microsoft-edge-stable
        state: present
        update_cache: true

    - name: Install Ghostty via snap
      community.general.snap:
        name: ghostty
        classic: true
        state: present

    - name: Download NodeSource setup script
      ansible.builtin.get_url:
        url: https://deb.nodesource.com/setup_lts.x
        dest: /tmp/nodesource-setup.sh
        mode: "0755"

    - name: Run NodeSource setup script
      ansible.builtin.command:
        cmd: /tmp/nodesource-setup.sh
        creates: /etc/apt/sources.list.d/nodesource.list

    - name: Install Node.js
      ansible.builtin.apt:
        name: nodejs
        state: present
        update_cache: true

    - name: Install Claude Code via npm
      community.general.npm:
        name: "@anthropic-ai/claude-code"
        global: true
        state: present

    - name: Write starship config
      ansible.builtin.copy:
        dest: "{{ user_home }}/.config/starship.toml"
        owner: "{{ desktop_user }}"
        group: "{{ desktop_user }}"
        mode: "0644"
        content: |
          [character]
          success_symbol = "[❯](bold green)"
          error_symbol = "[❯](bold red)"

          [directory]
          truncation_length = 4
          truncate_to_repo = true

          [git_branch]
          symbol = " "

          [git_status]
          ahead = "⇡${count}"
          diverged = "⇕⇡${ahead_count}⇣${behind_count}"
          behind = "⇣${count}"

          [golang]
          symbol = " "

          [python]
          symbol = " "

          [terraform]
          symbol = "󱁢 "
