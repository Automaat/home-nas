---
- name: Deploy sybra to sybra LXC
  hosts: sybra
  become: true

  vars:
    data_root: /data
    compose_file: /opt/sybra/docker-compose.yml
    env_file: /opt/sybra/.env
    sybra_uid: "1000"
    sybra_gid: "1000"

  handlers:
    - name: Restart sybra
      ansible.builtin.command: docker restart sybra
      changed_when: true

  tasks:
    - name: Install Docker and dependencies
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-v2
        state: present
        update_cache: true

    - name: Ensure Docker service is running
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Migrate data from /data/synapse to /data/sybra (one-time rename)
      ansible.builtin.command: mv {{ data_root }}/synapse {{ data_root }}/sybra
      args:
        creates: "{{ data_root }}/sybra"
        removes: "{{ data_root }}/synapse"

    - name: Create data directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
        owner: "{{ sybra_uid }}"
        group: "{{ sybra_gid }}"
      loop:
        - "{{ data_root }}/sybra"
        - "{{ data_root }}/sybra/home"
        - "{{ data_root }}/sybra/claude"
        - "{{ data_root }}/sybra/codex"

    - name: Chown sybra data tree to non-root uid (migration from root-owned layout)
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        recurse: true
        owner: "{{ sybra_uid }}"
        group: "{{ sybra_gid }}"
      loop:
        - "{{ data_root }}/sybra/home"
        - "{{ data_root }}/sybra/claude"
        - "{{ data_root }}/sybra/codex"

    - name: Create compose directory
      ansible.builtin.file:
        path: /opt/sybra
        state: directory
        mode: '0755'

    - name: Copy docker-compose file
      ansible.builtin.copy:
        src: ../docker-compose/sybra-stack.yml
        dest: "{{ compose_file }}"
        mode: '0644'

    - name: Extract GitHub token from sops
      ansible.builtin.command: >
        sops -d --extract '["github_token"]'
        {{ playbook_dir }}/../secrets/secrets.yaml
      register: gh_token_result
      delegate_to: localhost
      become: false
      no_log: true
      changed_when: false

    - name: Set GitHub token fact
      ansible.builtin.set_fact:
        gh_token: "{{ gh_token_result.stdout }}"
      no_log: true

    - name: Create .env file with GitHub token
      ansible.builtin.copy:
        content: |
          GH_TOKEN={{ gh_token }}
        dest: "{{ env_file }}"
        mode: '0600'
      no_log: true
      notify: Restart sybra

    - name: Install klaudiush hooks for Claude Code
      ansible.builtin.copy:
        src: sybra/claude/settings.json
        dest: "{{ data_root }}/sybra/claude/settings.json"
        mode: '0644'
        owner: "{{ sybra_uid }}"
        group: "{{ sybra_gid }}"

    - name: Install global CLAUDE.md
      ansible.builtin.copy:
        src: sybra/claude/CLAUDE.md
        dest: "{{ data_root }}/sybra/claude/CLAUDE.md"
        mode: '0644'
        owner: "{{ sybra_uid }}"
        group: "{{ sybra_gid }}"

    - name: Install Codex config with hooks feature flag
      ansible.builtin.copy:
        src: sybra/codex/config.toml
        dest: "{{ data_root }}/sybra/codex/config.toml"
        mode: '0644'
        owner: "{{ sybra_uid }}"
        group: "{{ sybra_gid }}"
        force: false

    - name: Install klaudiush hooks for Codex
      ansible.builtin.copy:
        src: sybra/codex/hooks.json
        dest: "{{ data_root }}/sybra/codex/hooks.json"
        mode: '0644'
        owner: "{{ sybra_uid }}"
        group: "{{ sybra_gid }}"

    - name: Install global AGENTS.md
      ansible.builtin.copy:
        src: sybra/codex/AGENTS.md
        dest: "{{ data_root }}/sybra/codex/AGENTS.md"
        mode: '0644'
        owner: "{{ sybra_uid }}"
        group: "{{ sybra_gid }}"

    - name: Enable Prometheus metrics in sybra config
      ansible.builtin.blockinfile:
        path: "{{ data_root }}/sybra/home/config.yaml"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - metrics"
        block: |
          metrics:
              enabled: true
        create: false
      notify: Restart sybra

    # The server container has 14GB RAM and 6 cores (see ansible/playbooks/
    # setup-sybra-lxc.yml). The default max_concurrent=3 was sized for a
    # laptop and caused "max concurrent agents reached (3)" errors during
    # batch workflow runs on 2026-04-16. max_turns=100 brings the guardrail
    # down from the default 150 after agent 70affeff burned 150 turns on a
    # test task. log_retention_days=7 matches the rotation cadence of the
    # rotating slog writer.
    - name: Tune agent defaults in sybra config
      ansible.builtin.blockinfile:
        path: "{{ data_root }}/sybra/home/config.yaml"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - agent"
        block: |
          agent:
              max_concurrent: 10
              max_turns: 100
              log_retention_days: 7
        create: false
      notify: Restart sybra

    - name: Deploy sybra stack
      community.docker.docker_compose_v2:
        project_src: /opt/sybra
        state: present
        pull: always

    - name: Wait for services to be ready
      ansible.builtin.wait_for:
        timeout: 30
      delegate_to: localhost
      become: false

    - name: Verify container is running
      ansible.builtin.shell:
        cmd: docker ps --filter name=^sybra$ --filter status=running --format '{% raw %}{{.Names}}{% endraw %}'
      register: container_status
      changed_when: false
      failed_when: container_status.stdout_lines | length == 0
