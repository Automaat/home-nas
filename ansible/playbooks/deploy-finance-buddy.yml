---
- name: Deploy finance-buddy to pet-projects LXC
  hosts: pet-projects
  become: true

  vars:
    data_root: /data
    compose_file: /opt/finance-buddy/docker-compose.yml
    env_file: /opt/finance-buddy/.env

  tasks:
    - name: Install Docker and dependencies
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-v2
        state: present
        update_cache: true

    - name: Ensure Docker service is running
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Create data directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
        owner: "1000"
        group: "1000"
      loop:
        - "{{ data_root }}/finance-buddy"
        - "{{ data_root }}/finance-buddy/postgres"

    - name: Create compose directory
      ansible.builtin.file:
        path: /opt/finance-buddy
        state: directory
        mode: '0755'

    - name: Copy docker-compose file
      ansible.builtin.copy:
        src: ../docker-compose/finance-buddy-stack.yml
        dest: "{{ compose_file }}"
        mode: '0644'

    - name: Extract finance DB password from sops
      ansible.builtin.shell: |
        set -o pipefail
        sops -d --extract '["finance_db_password"]' {{ playbook_dir }}/../secrets/secrets.yaml
      register: db_password_result
      delegate_to: localhost
      become: false
      no_log: true
      changed_when: false

    - name: Extract finance app password from sops
      ansible.builtin.shell: |
        set -o pipefail
        sops -d --extract '["finance_app_password"]' {{ playbook_dir }}/../secrets/secrets.yaml
      register: app_password_result
      delegate_to: localhost
      become: false
      no_log: true
      changed_when: false

    - name: Get host IP
      ansible.builtin.command:
        cmd: hostname -I
      register: host_ip_result
      changed_when: false

    - name: Set facts
      ansible.builtin.set_fact:
        finance_db_password: "{{ db_password_result.stdout }}"
        finance_app_password: "{{ app_password_result.stdout }}"
        host_ip: "{{ host_ip_result.stdout.split()[0] }}"
      no_log: true

    - name: Create .env file
      ansible.builtin.copy:
        content: |
          FINANCE_DB_PASSWORD={{ finance_db_password }}
          FINANCE_APP_PASSWORD={{ finance_app_password }}
          HOST_IP={{ host_ip }}
        dest: "{{ env_file }}"
        mode: '0600'
      no_log: true

    - name: Deploy finance-buddy stack
      community.docker.docker_compose_v2:
        project_src: /opt/finance-buddy
        state: present
        pull: always

    - name: Wait for services to be ready
      ansible.builtin.wait_for:
        timeout: 30
      delegate_to: localhost
      become: false

    - name: Verify containers are running
      community.docker.docker_container_info:
        name: "{{ item }}"
      register: container_info
      failed_when: not container_info.exists or container_info.container.State.Status != 'running'
      loop:
        - finance-postgres
        - finance-backend
        - finance-app
