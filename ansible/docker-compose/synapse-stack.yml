---
services:
  synapse:
    container_name: synapse
    image: ghcr.io/automaat/synapse:0.21.0
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /data/synapse/home:/home/synapse/.synapse
      - /data/synapse/claude:/home/synapse/.claude
      - /data/synapse/codex:/home/synapse/.codex
    environment:
      SYNAPSE_PORT: "8080"
      SYNAPSE_STATIC_DIR: /app/web
      GH_TOKEN: ${GH_TOKEN}
    env_file:
      - .env
    security_opt:
      - apparmor:unconfined
    deploy:
      resources:
        limits:
          memory: 14G
        reservations:
          memory: 2G
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -sf http://localhost:8080/health || exit 1
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
