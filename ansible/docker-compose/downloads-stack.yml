  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.2.0-libtorrentv1
    container_name: qbittorrent
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
      - WEBUI_PORT=8080
    volumes:
      - /mnt/tank-media/qbittorrent:/config
      - /mnt/tank-media/downloads:/data/downloads
    stop_grace_period: 120s
    restart: unless-stopped

  qbittorrent-exporter:
    # Upstream publishes only `latest` and sha-based tags on Docker Hub;
    # no semver tags despite the GitHub release naming scheme.
    image: esanchezm/prometheus-qbittorrent-exporter:latest
    container_name: qbittorrent-exporter
    network_mode: host
    environment:
      QBITTORRENT_HOST: localhost
      QBITTORRENT_PORT: "8080"
      # LocalHostAuth=false in qBittorrent.conf — localhost scraping is
      # unauthenticated, so no credentials needed.
      EXPORTER_PORT: "9102"
    restart: unless-stopped
    depends_on:
      - qbittorrent
