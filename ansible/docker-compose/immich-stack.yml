---
services:
  immich-server:
    container_name: immich-server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    volumes:
      - /data/immich/upload:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_HOSTNAME=immich-postgres
      - DB_USERNAME=immich
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich-redis
      - TZ=Europe/Amsterdam
      - IMMICH_TELEMETRY_INCLUDE=all
    ports:
      - '2283:2283'
      - '8081:8081'  # Prometheus metrics (api process)
    depends_on:
      - redis
      - database
    restart: unless-stopped
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich-machine-learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}-rocm
    group_add:
      - "44"   # video group
      - "993"  # render group
    devices:
      - /dev/dri:/dev/dri  # AMD GPU acceleration
      - /dev/kfd:/dev/kfd  # ROCm kernel driver (if available)
    environment:
      - TZ=Europe/Amsterdam
      - HSA_OVERRIDE_GFX_VERSION=11.0.0  # AMD 780M compatibility
      - MACHINE_LEARNING_MODEL_TTL=300  # 5min GPU idle timeout
    volumes:
      - /data/immich/model-cache:/cache
    restart: unless-stopped
    healthcheck:
      disable: false

  redis:
    container_name: immich-redis
    image: >-
      docker.io/valkey/valkey:9@sha256:546304417feac0874c3dd576e0952c6bb8f06bb4093ea0c9ca303c73cf458f63
    healthcheck:
      test: redis-cli ping || exit 1
    restart: unless-stopped

  immich-redis-exporter:
    container_name: immich-redis-exporter
    image: oliver006/redis_exporter:v1.83.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://immich-redis:6379"
    ports:
      - "9121:9121"
    depends_on:
      - redis

  database:
    container_name: immich-postgres
    image: >-
      ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      - POSTGRES_PASSWORD=${IMMICH_DB_PASSWORD}
      - POSTGRES_USER=immich
      - POSTGRES_DB=immich
      - POSTGRES_INITDB_ARGS=--data-checksums
    volumes:
      - /data/immich/postgres:/var/lib/postgresql/data
    shm_size: 128mb
    restart: unless-stopped
    healthcheck:
      disable: false

  immich-postgres-exporter:
    container_name: immich-postgres-exporter
    image: quay.io/prometheuscommunity/postgres-exporter:v0.19.1
    restart: unless-stopped
    environment:
      DATA_SOURCE_URI: "immich-postgres:5432/immich?sslmode=disable"
      DATA_SOURCE_USER: immich
      DATA_SOURCE_PASS: ${IMMICH_DB_PASSWORD}
    ports:
      - "9187:9187"
    depends_on:
      - database
