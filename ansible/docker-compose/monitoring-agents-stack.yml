---
# Per-host monitoring agents running on every docker host.
# Exposes container-level metrics on :9101 for homelab Prometheus to scrape
# and ships docker/journal logs to homelab Loki via promtail.
#
# Phases 3 + 5 of home-nas → smart-home monitoring integration.

services:
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    ports:
      - "9101:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    command:
      - --housekeeping_interval=30s
      - --docker_only=true
      - --store_container_labels=false
      - --whitelisted_container_labels=io.kubernetes.container.name,io.kubernetes.pod.name,com.docker.compose.project,com.docker.compose.service

  promtail:
    image: grafana/promtail:3.6.6
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/promtail:/var/lib/promtail
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
    command:
      - -config.file=/etc/promtail/config.yml
