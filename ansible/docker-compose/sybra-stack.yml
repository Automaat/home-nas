---
services:
  sybra:
    container_name: sybra
    image: ghcr.io/automaat/sybra:0.25.0
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /data/sybra/home:/home/sybra/.sybra
      - /data/sybra/claude:/home/sybra/.claude
      - /data/sybra/codex:/home/sybra/.codex
    environment:
      SYBRA_PORT: "8080"
      SYBRA_STATIC_DIR: /app/web
      GH_TOKEN: ${GH_TOKEN}
    env_file:
      - .env
    security_opt:
      - apparmor:unconfined
    deploy:
      resources:
        limits:
          memory: 14G
        reservations:
          memory: 2G
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -sf http://localhost:8080/health || exit 1
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
