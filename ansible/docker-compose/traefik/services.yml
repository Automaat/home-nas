---
http:
  routers:
    jellyfin:
      rule: "Host(`jellyfin.mskalski.dev`)"
      service: jellyfin
      entryPoints: [web, websecure]
      tls:
        certResolver: cloudflare
        domains:
          - main: "*.mskalski.dev"

    jellyseerr:
      rule: "Host(`jellyseerr.mskalski.dev`)"
      service: jellyseerr
      entryPoints: [web, websecure]
      tls:
        certResolver: cloudflare

    sonarr:
      rule: "Host(`sonarr.mskalski.dev`)"
      service: sonarr
      entryPoints: [web, websecure]
      middlewares: [internal-whitelist]
      tls:
        certResolver: cloudflare

    radarr:
      rule: "Host(`radarr.mskalski.dev`)"
      service: radarr
      entryPoints: [web, websecure]
      middlewares: [internal-whitelist]
      tls:
        certResolver: cloudflare

    prowlarr:
      rule: "Host(`prowlarr.mskalski.dev`)"
      service: prowlarr
      entryPoints: [web, websecure]
      middlewares: [internal-whitelist]
      tls:
        certResolver: cloudflare

    immich:
      rule: "Host(`immich.mskalski.dev`)"
      service: immich
      entryPoints: [web, websecure]
      middlewares: [internal-whitelist]
      tls:
        certResolver: cloudflare

    paperless:
      rule: "Host(`paperless.mskalski.dev`)"
      service: paperless
      entryPoints: [web, websecure]
      middlewares: [internal-whitelist]
      tls:
        certResolver: cloudflare

    nextcloud:
      rule: "Host(`nextcloud.mskalski.dev`)"
      service: nextcloud
      entryPoints: [web, websecure]
      middlewares: [internal-whitelist]
      tls:
        certResolver: cloudflare

    mixarr:
      rule: "Host(`mixarr.mskalski.dev`)"
      service: mixarr
      entryPoints: [web, websecure]
      middlewares: [internal-whitelist]
      tls:
        certResolver: cloudflare

    lidify:
      rule: "Host(`lidify.mskalski.dev`)"
      service: lidify
      entryPoints: [web, websecure]
      middlewares: [internal-whitelist]
      tls:
        certResolver: cloudflare

    synapse:
      rule: "Host(`synapse.mskalski.dev`)"
      service: synapse
      entryPoints: [web, websecure]
      middlewares: [internal-whitelist]
      tls:
        certResolver: cloudflare

    finance:
      rule: "Host(`finance.mskalski.dev`)"
      service: finance
      entryPoints: [web, websecure]
      middlewares: [internal-whitelist]
      tls:
        certResolver: cloudflare

    finance-api:
      rule: "Host(`finance-api.mskalski.dev`)"
      service: finance-api
      entryPoints: [web, websecure]
      middlewares: [internal-whitelist]
      tls:
        certResolver: cloudflare

  services:
    jellyfin:
      loadBalancer:
        servers:
          - url: "http://192.168.20.191:8096"

    jellyseerr:
      loadBalancer:
        servers:
          - url: "http://192.168.20.191:5055"

    sonarr:
      loadBalancer:
        servers:
          - url: "http://192.168.20.192:8989"

    radarr:
      loadBalancer:
        servers:
          - url: "http://192.168.20.192:7878"

    prowlarr:
      loadBalancer:
        servers:
          - url: "http://192.168.20.192:9696"

    immich:
      loadBalancer:
        servers:
          - url: "http://192.168.20.191:2283"

    paperless:
      loadBalancer:
        servers:
          - url: "http://192.168.20.106:8010"

    nextcloud:
      loadBalancer:
        servers:
          - url: "http://192.168.20.106:8020"

    mixarr:
      loadBalancer:
        servers:
          - url: "http://192.168.20.191:3010"

    lidify:
      loadBalancer:
        servers:
          - url: "http://192.168.20.191:5000"

    synapse:
      loadBalancer:
        servers:
          - url: "http://192.168.20.219:8080"

    finance:
      loadBalancer:
        servers:
          - url: "http://192.168.20.106:3000"

    finance-api:
      loadBalancer:
        servers:
          - url: "http://192.168.20.106:8000"

  middlewares:
    internal-whitelist:
      ipWhiteList:
        sourceRange:
          - "192.168.0.0/16"
          - "172.16.0.0/12"  # Cloudflare Tunnel connector
          - "100.64.0.0/10"  # Tailscale CGNAT
