---
http:
  routers:
    jellyfin:
      rule: "Host(`jellyfin.mskalski.dev`)"
      service: jellyfin
      entryPoints: [web]

    jellyseerr:
      rule: "Host(`jellyseerr.mskalski.dev`)"
      service: jellyseerr
      entryPoints: [web]

    sonarr:
      rule: "Host(`sonarr.mskalski.dev`)"
      service: sonarr
      entryPoints: [web]
      middlewares: [internal-whitelist]

    radarr:
      rule: "Host(`radarr.mskalski.dev`)"
      service: radarr
      entryPoints: [web]
      middlewares: [internal-whitelist]

    prowlarr:
      rule: "Host(`prowlarr.mskalski.dev`)"
      service: prowlarr
      entryPoints: [web]
      middlewares: [internal-whitelist]

    immich:
      rule: "Host(`immich.mskalski.dev`)"
      service: immich
      entryPoints: [web]
      middlewares: [internal-whitelist]

    paperless:
      rule: "Host(`paperless.mskalski.dev`)"
      service: paperless
      entryPoints: [web]
      middlewares: [internal-whitelist]

    nextcloud:
      rule: "Host(`nextcloud.mskalski.dev`)"
      service: nextcloud
      entryPoints: [web]
      middlewares: [internal-whitelist]

    mixarr:
      rule: "Host(`mixarr.mskalski.dev`)"
      service: mixarr
      entryPoints: [web]
      middlewares: [internal-whitelist]

    lidify:
      rule: "Host(`lidify.mskalski.dev`)"
      service: lidify
      entryPoints: [web]
      middlewares: [internal-whitelist]

    synapse:
      rule: "Host(`synapse.mskalski.dev`)"
      service: synapse
      entryPoints: [web]
      middlewares: [internal-whitelist]

  services:
    jellyfin:
      loadBalancer:
        servers:
          - url: "http://192.168.20.191:8096"

    jellyseerr:
      loadBalancer:
        servers:
          - url: "http://192.168.20.191:5055"

    sonarr:
      loadBalancer:
        servers:
          - url: "http://192.168.20.192:8989"

    radarr:
      loadBalancer:
        servers:
          - url: "http://192.168.20.192:7878"

    prowlarr:
      loadBalancer:
        servers:
          - url: "http://192.168.20.192:9696"

    immich:
      loadBalancer:
        servers:
          - url: "http://192.168.20.191:2283"

    paperless:
      loadBalancer:
        servers:
          - url: "http://192.168.20.106:8010"

    nextcloud:
      loadBalancer:
        servers:
          - url: "http://192.168.20.106:8020"

    mixarr:
      loadBalancer:
        servers:
          - url: "http://192.168.20.191:3010"

    lidify:
      loadBalancer:
        servers:
          - url: "http://192.168.20.191:5000"

    synapse:
      loadBalancer:
        servers:
          - url: "http://192.168.20.219:8080"

  middlewares:
    internal-whitelist:
      ipWhiteList:
        sourceRange:
          - "192.168.0.0/16"
          - "172.16.0.0/12"  # Cloudflare Tunnel connector
