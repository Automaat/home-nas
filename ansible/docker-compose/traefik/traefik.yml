---
api:
  dashboard: true
  insecure: true  # Dashboard on :8080 (internal only)

metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true
    addRoutersLabels: true
    # /metrics served on the traefik internal entrypoint (:8080) alongside
    # the dashboard. Scraped by homelab Prometheus.

entryPoints:
  web:
    address: ":80"

  websecure:
    address: ":443"

providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  cloudflare:
    acme:
      email: skalskimarcin33@gmail.com
      storage: /etc/traefik/acme.json
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - 1.1.1.1:53
          - 8.8.8.8:53

log:
  level: INFO

accessLog:
  filePath: /var/log/traefik/access.log
  bufferingSize: 100
